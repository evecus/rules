name: mihomo_mrs文件生成

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Install mihomo
        run: |
          wget https://github.com/MetaCubeX/mihomo/releases/download/v1.19.17/mihomo-linux-amd64-v1.19.17.gz
          gunzip mihomo-linux-amd64-v1.19.17.gz
          mv mihomo-linux-amd64-v1.19.17 mihomo
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/mihomo

      - name: Find and convert rule files
        run: |
          RULE_DIR="mihomo"
          # 只匹配 .yaml 文件，用文件名中含 _ip 还是 _domain 来判断类型
          find "$RULE_DIR" -type f -name "*.yaml" | while read FILE; do
            BASENAME=$(basename "$FILE")

            if [[ "$BASENAME" == *_ip* ]]; then
              TYPE="ipcidr"
            elif [[ "$BASENAME" == *_domain* ]]; then
              TYPE="domain"
            else
              echo "跳过（无法判断类型）: $FILE"
              continue
            fi

            OUTPUT="${FILE%.yaml}.mrs"
            echo "Converting [$TYPE] $FILE → $OUTPUT"
            mihomo convert-ruleset "$TYPE" yaml "$FILE" "$OUTPUT"
          done

      - name: Commit and push to master
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          # 只 add mrs 文件，绝不动其他文件
          git add mihomo/*.mrs
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto convert Mihomo rules"
            git push origin master
          fi
